server {
    listen 80;
    listen [::]:80;
    server_name kaswarga.koneksi.co.id;

    root /var/www/kaswarga.koneksi.co.id/current;
    index index.html;

    access_log /var/log/nginx/kaswarga.koneksi.co.id.access.log;
    error_log /var/log/nginx/kaswarga.koneksi.co.id.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location = /manifest.json {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|otf|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }
}
